name: Deploy Web to FTP

on:
  push:
    branches:
      - main
    paths:
      - 'web/**'

jobs:
  deploy:
    name: Build & Deploy Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./web

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build Static Site
        run: npm run build
        env:
          # Production API URL
          NEXT_PUBLIC_API_URL: https://api.rx.dumostech.com/api/v1

      - name: Sync files to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # The directory on the server where the 'rx' subdomain points to
          server-dir: /rx.dumostech.com/
          local-dir: ./web/out/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
