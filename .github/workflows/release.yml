name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (macOS only)
        if: matrix.platform == 'macos-latest'
        run: |
          brew install apple-gcc42 || true

      - name: Install dependencies (Linux only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install app dependencies
        run: |
          cd client
          npm install
      
      - name: Fix Tailwind/LightningCSS Native Bindings (Windows only)
        if: matrix.platform == 'windows-latest'
        run: |
          cd client
          npm install --force @tailwindcss/oxide-win32-x64-msvc lightningcss-win32-x64-msvc

      - name: Fix Tailwind/LightningCSS Native Bindings (Linux only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          cd client
          npm install --force @tailwindcss/oxide-linux-x64-gnu lightningcss-linux-x64-gnu

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: client
          tagName: ${{ github.ref_name }}
          releaseName: "DumosRx ${{ github.ref_name }}"
          releaseBody: "Automated release from GitHub Actions."
          releaseDraft: false
          prerelease: false
          includeRelease: true
